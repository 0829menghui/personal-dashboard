    location = /personal-dashboard {
        return 301 /personal-dashboard/;
    }

    location = /personal-dashboard/ {
        alias /opt/personal-dashboard/frontend/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location ^~ /personal-dashboard/api/ {
        proxy_pass http://127.0.0.1:8020/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /personal-dashboard/index.html {
        alias /opt/personal-dashboard/frontend/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    location ^~ /personal-dashboard/assets/ {
        alias /opt/personal-dashboard/frontend/dist/assets/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /personal-dashboard/ {
        alias /opt/personal-dashboard/frontend/dist/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /personal-dashboard/index.html;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8020/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8020/openapi.json;
        proxy_set_header Host $host;
    }
